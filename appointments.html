<body>

    <main>
      <h1>Access Treatment Plans</h1>
      <p>Select a pet to view treatment information.</p>
      <form id="treatmentForm" class="treatment-selector">
        <label for="petSelect">Pet</label>
        <select id="petSelect" required>
          <option value="">Choose a pet</option>
          <option value="Mochi|Annual exam scheduled|Continue allergy medication once daily|Follow-up in 6 months">Mochi</option>
          <option value="Juniper|Recovering after dental cleaning|Soft food for 3 days|Recheck if appetite drops">Juniper</option>
        </select>
        <button class="btn" type="submit">View Treatment Plan</button>
      </form>
      <section class="summary-card" id="treatmentOutput"></section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
