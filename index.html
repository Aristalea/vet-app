<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vet App Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <main class="login-page">
      <h1>Companions Veterinary Center</h1>
      <p>Please sign in to continue.</p>

      <form id="loginForm" class="form-grid">
        <label>
          Email
          <input type="email" name="email" required />
        </label>

        <label>
          Password
          <input type="password" name="password" required />
        </label>

        <div class="full-width footer-actions">
          <button class="btn" type="submit">Log In</button>
        </div>
      </form>

      <section class="summary-card">
        <h2>Demo Login Information</h2>
        <p><strong>Patient:</strong> patient@vetapp.com / patient123</p>
        <p><strong>Employee:</strong> employee@vetapp.com / employee123</p>
      </section>

      <p id="loginError"></p>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
