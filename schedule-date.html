<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Appointment | Date</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <a href="home.html">Home</a>
      <a href="appointments.html">Appointments</a>
      <a href="treatment-plan.html">Access Treatment Plans</a>
      <a href="#">Discharge Instructions</a>

      <a href="my-pets.html">My Pets</a>

    </nav>

    <main>
      <h1>Schedule an Appointment</h1>
      <p>First, pick a date that works for you.</p>
      <form id="dateForm">
        <div class="choice-grid two">
          <label class="choice-card">
            <input type="radio" name="appointmentDate" value="2026-04-25" required />
            <span>
              April 25, 2026<br>
              <small id="availability-2026-04-25"></small>
            </span>
          </label>

          <label class="choice-card">
            <input type="radio" name="appointmentDate" value="2026-04-26" required />
            <span>
              April 26, 2026<br>
              <small id="availability-2026-04-26"></small>
            </span>
          </label>
        </div>
        <div class="footer-actions">
          <a class="btn btn-secondary" href="appointments.html">Back</a>
          <button class="btn" type="submit">Next</button>
        </div>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
