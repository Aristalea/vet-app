<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Appointment | Details</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <a href="schedule-date.html">Schedule an Appointment</a>
      <a href="treatment-plan.html">Access Treatment Plans</a>
      <a href="#">Discharge Instructions</a>
      <a href="#">Billing and Invoices</a>
      <a href="#">My Pets</a>
      <a href="#">My Account</a>
      <a href="index.html">Log Out</a>
    </nav>

    <main>
      <h1>Schedule an Appointment</h1>
      <p>Enter pet and owner information.</p>
      <form id="detailsForm" class="form-grid">
        <label class="full-width">
          Select Pet
          <select id="petSelect" name="petSelect">
            <option value="">-- Select a Pet --</option>
            <option value="new">+ Add New Pet</option>
          </select>
        </label>
        <label>Pet Name<input name="petName" required /></label>
        <label>Last Visit<input name="lastVisit" placeholder="MM/DD/YYYY" /></label>
        <label>Pet Species<input name="petSpecies" required /></label>
        <label>Owner Name<input name="ownerName" required /></label>
        <label>Pet Breed<input name="petBreed" /></label>
        <label>Owner Email<input name="ownerEmail" type="email" required /></label>
        <label>Pet Gender<input name="petGender" /></label>
        <label>Owner Phone<input name="ownerPhone" required /></label>
        <label>Pet Age<input name="petAge" /></label>
        <label>Notes<textarea name="notes" rows="3"></textarea></label>
        <div class="full-width footer-actions">
          <a class="btn btn-secondary" href="schedule-time.html">Back</a>
          <button class="btn" type="submit">Next</button>
        </div>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
