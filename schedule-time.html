<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Appointment | Time</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="top-nav">
      <a href="appointments.html">Appointments</a>
      <a href="treatment-plan.html">Access Treatment Plans</a>
      <a href="#">Discharge Instructions</a>
      <a href="#">Billing and Invoices</a>
      <a href="#">My Pets</a>
      <a href="#">My Account</a>
      <a href="index.html">Log Out</a>
    </nav>

    <main>
      <h1>Schedule an Appointment</h1>
      <p id="selectedDateText">Next, review available appointments.</p>
      <form id="timeForm">
        <div class="choice-grid four">
          <label class="choice-card"><input type="radio" name="appointmentTime" value="9:00 AM | Dr. Smith | General" required /><span>9:00 AM<br><small>Dr. Smith<br>General</small></span></label>
          <label class="choice-card"><input type="radio" name="appointmentTime" value="10:30 AM | Dr. Diaz | Surgery" required /><span>10:30 AM<br><small>Dr. Diaz<br>Surgery</small></span></label>
          <label class="choice-card"><input type="radio" name="appointmentTime" value="1:00 PM | Dr. Patel | Dental" required /><span>1:00 PM<br><small>Dr. Patel<br>Dental</small></span></label>
          <label class="choice-card"><input type="radio" name="appointmentTime" value="3:30 PM | Dr. Smith | General" required /><span>3:30 PM<br><small>Dr. Smith<br>General</small></span></label>
        </div>
        <div class="footer-actions">
          <a class="btn btn-secondary" href="schedule-date.html">Back</a>
          <button class="btn" type="submit">Next</button>
        </div>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
